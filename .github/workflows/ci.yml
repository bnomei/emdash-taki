name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: VitePlus checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
      NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run VitePlus checks
        run: npx vp check .

      - name: Run TypeScript
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Validate VitePlus package build
        run: npx vp pack src/index.ts --format esm --dts --clean --tsconfig tsconfig.json --publint

      - name: Validate published types
        run: npm run types:check

      - name: Verify npm tarball
        run: npm pack --dry-run
